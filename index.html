<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI いとうたけし 遊★戯★王</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #f0e6c8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1a0a00 0%, #0a0a0a 50%, #1a0800 100%);
      border-bottom: 2px solid #c8a000;
      padding: 1rem 1.25rem;
      text-align: center;
      position: relative;
    }
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(200,160,0,0.03) 10px, rgba(200,160,0,0.03) 11px);
    }
    header h1 { font-family: 'Cinzel', serif; font-size: 20px; color: #c8a000; letter-spacing: 0.1em; position: relative; }
    header p { font-size: 11px; color: #888; margin-top: 2px; position: relative; letter-spacing: 0.05em; }

    .container { max-width: 480px; margin: 0 auto; padding: 1rem; }

    .tab-row { display: flex; gap: 6px; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 2px; }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab {
      padding: 6px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; white-space: nowrap;
      border: 1px solid #333; background: #111; color: #888; transition: all 0.2s; flex-shrink: 0;
    }
    .tab.active { background: #c8a000; color: #0a0a0a; border-color: #c8a000; font-weight: 700; }

    .card {
      background: linear-gradient(145deg, #111 0%, #0d0d0d 100%);
      border: 1px solid #2a2000;
      border-top: 2px solid #c8a000;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 16px 16px 0;
      border-color: transparent #c8a000 transparent transparent;
      border-radius: 0 6px 0 0;
    }
    .card-title { font-size: 11px; color: #c8a000; margin-bottom: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }

    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .input-group { display: flex; flex-direction: column; gap: 3px; }
    .input-group label { font-size: 11px; color: #888; }
    .input-group input {
      background: #0a0a0a; border: 1px solid #2a2000; border-radius: 4px;
      padding: 8px 10px; font-size: 14px; color: #f0e6c8; width: 100%; outline: none;
      transition: border 0.15s;
    }
    .input-group input:focus { border-color: #c8a000; }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #c8a000 0%, #a07800 50%, #c8a000 100%);
      color: #0a0a0a; border: none; border-radius: 4px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      margin-top: 0.5rem; letter-spacing: 0.05em;
      transition: opacity 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .btn:active { opacity: 0.85; transform: scale(0.99); }

    .result-area { margin-top: 1rem; }

    .verdict {
      border-radius: 6px; padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      border: 1px solid;
    }
    .verdict-label { font-size: 11px; margin-bottom: 4px; letter-spacing: 0.05em; }
    .verdict-main { font-size: 20px; font-weight: 700; }
    .verdict-reason { font-size: 12px; margin-top: 8px; line-height: 1.7; opacity: 0.85; }

    .buy { background: #0a1a0a; border-color: #1a6a1a; }
    .buy .verdict-label { color: #4aaa4a; }
    .buy .verdict-main { color: #4aee4a; }
    .caution { background: #1a1200; border-color: #6a5000; }
    .caution .verdict-label { color: #c8a000; }
    .caution .verdict-main { color: #f0c000; }
    .skip { background: #1a0000; border-color: #6a0000; }
    .skip .verdict-label { color: #cc3333; }
    .skip .verdict-main { color: #ff4444; }

    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.75rem; }
    .metric {
      background: #111; border: 1px solid #2a2000; border-radius: 6px;
      padding: 10px 12px;
    }
    .metric-label { font-size: 10px; color: #888; margin-bottom: 3px; }
    .metric-value { font-size: 20px; font-weight: 700; color: #c8a000; }
    .metric-sub { font-size: 10px; color: #555; margin-top: 2px; }

    .strategy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.75rem; }
    .strategy-box {
      background: #111; border: 1px solid #2a2000; border-radius: 6px;
      padding: 10px 12px;
    }
    .slabel { font-size: 10px; color: #888; margin-bottom: 2px; }
    .sval { font-size: 16px; font-weight: 700; color: #f0e6c8; }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .tag { font-size: 11px; padding: 3px 10px; border-radius: 3px; font-weight: 600; }
    .tag-ok { background: #0a2a0a; color: #4aee4a; border: 1px solid #1a6a1a; }
    .tag-ng { background: #2a0000; color: #ff4444; border: 1px solid #6a0000; }
    .tag-warn { background: #1a1200; color: #f0c000; border: 1px solid #6a5000; }

    .hidden { display: none; }
    .divider { height: 1px; background: linear-gradient(to right, transparent, #c8a000, transparent); margin: 0.75rem 0; }
  </style>
</head>
<body>

<header>
  <h1>AI いとうたけし</h1>
  <p>PSA 期待値判定システム</p>
</header>

<div class="container">

  <div class="tab-row">
    <div class="tab active" onclick="switchTab('pp4')">PP4 ブラマジガール</div>
    <div class="tab" onclick="switchTab('kaiba')">海馬セット</div>
    <div class="tab" onclick="switchTab('ukiyoe')">浮世絵ブルーアイズ</div>
  </div>

  <div id="tab-pp4">
    <div class="card">
      <div class="card-title">仕入れ条件</div>
      <div class="input-grid">
        <div class="input-group"><label>仕入れ単価（円）</label><input type="number" id="pp4_cost" value="2100"></div>
        <div class="input-group"><label>鑑定料（円）</label><input type="number" id="pp4_fee" value="4980"></div>
        <div class="input-group"><label>提出率（%）</label><input type="number" id="pp4_submit" value="50"></div>
        <div class="input-group"><label>販売手数料（%）</label><input type="number" id="pp4_commission" value="10"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">相場 &amp; PSA取得率</div>
      <div class="input-grid">
        <div class="input-group"><label>PSA10 売値（円）</label><input type="number" id="pp4_p10" value="35000"></div>
        <div class="input-group"><label>PSA9 売値（円）</label><input type="number" id="pp4_p9" value="5200"></div>
        <div class="input-group"><label>提出後 PSA10率（%）</label><input type="number" id="pp4_r10" value="30"></div>
        <div class="input-group"><label>提出後 PSA9率（%）</label><input type="number" id="pp4_r9" value="55"></div>
      </div>
    </div>
    <button class="btn" onclick="calc('pp4')">判定する</button>
    <div id="pp4_result" class="result-area hidden"></div>
  </div>

  <div id="tab-kaiba" class="hidden">
    <div class="card">
      <div class="card-title">仕入れ条件（3枚セット）</div>
      <div class="input-grid">
        <div class="input-group"><label>仕入れ価格（円）</label><input type="number" id="kaiba_cost" value="35000"></div>
        <div class="input-group"><label>鑑定料×3枚（円）</label><input type="number" id="kaiba_fee" value="14940"></div>
        <div class="input-group"><label>販売手数料（%）</label><input type="number" id="kaiba_commission" value="10"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">相場 &amp; PSA取得率</div>
      <div class="input-grid">
        <div class="input-group"><label>PSA10 売値 1枚（円）</label><input type="number" id="kaiba_p10" value="27000"></div>
        <div class="input-group"><label>PSA9 売値 1枚（円）</label><input type="number" id="kaiba_p9" value="8000"></div>
        <div class="input-group"><label>PSA10率（%）</label><input type="number" id="kaiba_r10" value="80"></div>
        <div class="input-group"><label>PSA9率（%）</label><input type="number" id="kaiba_r9" value="15"></div>
      </div>
    </div>
    <button class="btn" onclick="calc('kaiba')">判定する</button>
    <div id="kaiba_result" class="result-area hidden"></div>
  </div>

  <div id="tab-ukiyoe" class="hidden">
    <div class="card">
      <div class="card-title">仕入れ条件</div>
      <div class="input-grid">
        <div class="input-group"><label>仕入れ単価（円）</label><input type="number" id="ukiyoe_cost" value="16000"></div>
        <div class="input-group"><label>鑑定料（円）</label><input type="number" id="ukiyoe_fee" value="4980"></div>
        <div class="input-group"><label>販売手数料（%）</label><input type="number" id="ukiyoe_commission" value="10"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">相場 &amp; PSA取得率</div>
      <div class="input-grid">
        <div class="input-group"><label>PSA10 売値（円）</label><input type="number" id="ukiyoe_p10" value="40000"></div>
        <div class="input-group"><label>PSA9 売値（円）</label><input type="number" id="ukiyoe_p9" value="16000"></div>
        <div class="input-group"><label>PSA10率（%）</label><input type="number" id="ukiyoe_r10" value="87"></div>
        <div class="input-group"><label>PSA9率（%）</label><input type="number" id="ukiyoe_r9" value="10"></div>
      </div>
    </div>
    <button class="btn" onclick="calc('ukiyoe')">判定する</button>
    <div id="ukiyoe_result" class="result-area hidden"></div>
  </div>

</div>

<script>
function switchTab(name) {
  ['pp4','kaiba','ukiyoe'].forEach((t, i) => {
    document.getElementById('tab-' + t).classList.add('hidden');
    document.querySelectorAll('.tab')[i].classList.remove('active');
  });
  document.getElementById('tab-' + name).classList.remove('hidden');
  document.querySelectorAll('.tab')[['pp4','kaiba','ukiyoe'].indexOf(name)].classList.add('active');
}

function renderResult(id, ev_profit, machine_rate, break_even, avg_cost, buy_limit, p10_rate, reasons, tags) {
  const el = document.getElementById(id + '_result');
  let verdict_class, verdict_main;
  if (machine_rate >= 120) { verdict_class = 'buy'; verdict_main = '買い — 強気でいける'; }
  else if (machine_rate >= 100) { verdict_class = 'buy'; verdict_main = '買い — 期待値プラス'; }
  else if (machine_rate >= 85) { verdict_class = 'caution'; verdict_main = '微妙 — PSA10率次第'; }
  else { verdict_class = 'skip'; verdict_main = '見送り — 期待値マイナス'; }
  const tagHtml = tags.map(t => `<span class="tag tag-${t.type}">${t.label}</span>`).join('');
  el.innerHTML = `
    <div class="verdict ${verdict_class}">
      <div class="verdict-label">判定</div>
      <div class="verdict-main">${verdict_main}</div>
      <div class="verdict-reason">${reasons.join('<br>')}</div>
      <div class="tags">${tagHtml}</div>
    </div>
    <div class="result-grid">
      <div class="metric"><div class="metric-label">期待利益</div><div class="metric-value">${ev_profit >= 0 ? '+' : ''}${Math.round(ev_profit).toLocaleString()}円</div><div class="metric-sub">1回あたり</div></div>
      <div class="metric"><div class="metric-label">機械割</div><div class="metric-value">${machine_rate.toFixed(1)}%</div><div class="metric-sub">100%超でプラス</div></div>
      <div class="metric"><div class="metric-label">損益分岐 PSA10率</div><div class="metric-value">${break_even > 100 ? '超過' : break_even.toFixed(1) + '%'}</div><div class="metric-sub">最低限必要な率</div></div>
      <div class="metric"><div class="metric-label">平均投入コスト</div><div class="metric-value">${Math.round(avg_cost).toLocaleString()}円</div><div class="metric-sub">鑑定費按分込み</div></div>
    </div>
    <div class="strategy-row">
      <div class="strategy-box"><div class="slabel">買いOK上限</div><div class="sval">${Math.round(buy_limit).toLocaleString()}円</div></div>
      <div class="strategy-box"><div class="slabel">入力 PSA10率</div><div class="sval">${p10_rate.toFixed(0)}%</div></div>
    </div>
    <div class="divider"></div>
  `;
  el.classList.remove('hidden');
}

function calc(type) {
  if (type === 'pp4') {
    const cost = +document.getElementById('pp4_cost').value;
    const fee = +document.getElementById('pp4_fee').value;
    const submit = +document.getElementById('pp4_submit').value / 100;
    const commission = +document.getElementById('pp4_commission').value / 100;
    const p10 = +document.getElementById('pp4_p10').value;
    const p9 = +document.getElementById('pp4_p9').value;
    const r10 = +document.getElementById('pp4_r10').value / 100;
    const r9 = +document.getElementById('pp4_r9').value / 100;
    const p10n = p10 * (1 - commission), p9n = p9 * (1 - commission);
    const ev_submit = r10 * p10n + r9 * p9n - fee;
    const ev_profit = submit * ev_submit - cost;
    const avg_cost = cost + submit * fee;
    const ev_return = submit * (r10 * p10n + r9 * p9n);
    const machine_rate = avg_cost > 0 ? ev_return / avg_cost * 100 : 0;
    const A = submit * p10n;
    const B = submit * (r9 * p9n - fee) - cost;
    const break_even = A > 0 ? Math.max(0, -B / A * 100) : 999;
    const buy_limit = ev_return - submit * fee;
    const reasons = [], tags = [];
    if (r10 * 100 >= break_even) { reasons.push('PSA10率が損益分岐を超えている'); tags.push({type:'ok', label:'10率OK'}); }
    else { reasons.push('PSA10率が損益分岐を下回っている'); tags.push({type:'ng', label:'10率不足'}); }
    if (machine_rate >= 100) tags.push({type:'ok', label:'期待値プラス'}); else tags.push({type:'ng', label:'期待値マイナス'});
    if (p9 >= 4000) { reasons.push('PSA9も売れる構造'); tags.push({type:'ok', label:'PSA9有効'}); }
    else { reasons.push('PSA9が弱い — 10一本勝負'); tags.push({type:'warn', label:'PSA9弱い'}); }
    if (cost <= buy_limit) tags.push({type:'ok', label:'仕入れOK'}); else { reasons.push('仕入れ価格が高すぎる'); tags.push({type:'ng', label:'仕入れ高すぎ'}); }
    renderResult('pp4', ev_profit, machine_rate, break_even, avg_cost, buy_limit, r10 * 100, reasons, tags);
  }
  if (type === 'kaiba') {
    const cost = +document.getElementById('kaiba_cost').value;
    const fee = +document.getElementById('kaiba_fee').value;
    const commission = +document.getElementById('kaiba_commission').value / 100;
    const p10 = +document.getElementById('kaiba_p10').value;
    const p9 = +document.getElementById('kaiba_p9').value;
    const r10 = +document.getElementById('kaiba_r10').value / 100;
    const r9 = +document.getElementById('kaiba_r9').value / 100;
    const p10n = p10 * (1 - commission), p9n = p9 * (1 - commission);
    const ev_return = 3 * (r10 * p10n + r9 * p9n);
    const total_cost = cost + fee;
    const ev_profit = ev_return - total_cost;
    const machine_rate = total_cost > 0 ? ev_return / total_cost * 100 : 0;
    const break_even = (3 * p10n) > 0 ? (total_cost - 3 * r9 * p9n) / (3 * p10n) * 100 : 999;
    const buy_limit = ev_return - fee;
    const reasons = [], tags = [];
    if (machine_rate >= 100) { reasons.push('期待値プラス'); tags.push({type:'ok', label:'期待値プラス'}); }
    else { reasons.push('期待値マイナス — 仕入れを下げるか相場上昇待ち'); tags.push({type:'ng', label:'期待値マイナス'}); }
    if (r10 * 100 >= 70) { reasons.push('PSA10率が高い'); tags.push({type:'ok', label:'高10率'}); }
    else tags.push({type:'warn', label:'10率要確認'});
    if (cost <= buy_limit) tags.push({type:'ok', label:'仕入れOK'}); else { reasons.push('仕入れが高い'); tags.push({type:'ng', label:'仕入れ高すぎ'}); }
    renderResult('kaiba', ev_profit, machine_rate, break_even, total_cost, buy_limit, r10 * 100, reasons, tags);
  }
  if (type === 'ukiyoe') {
    const cost = +document.getElementById('ukiyoe_cost').value;
    const fee = +document.getElementById('ukiyoe_fee').value;
    const commission = +document.getElementById('ukiyoe_commission').value / 100;
    const p10 = +document.getElementById('ukiyoe_p10').value;
    const p9 = +document.getElementById('ukiyoe_p9').value;
    const r10 = +document.getElementById('ukiyoe_r10').value / 100;
    const r9 = +document.getElementById('ukiyoe_r9').value / 100;
    const p10n = p10 * (1 - commission), p9n = p9 * (1 - commission);
    const ev_return = r10 * p10n + r9 * p9n;
    const total_cost = cost + fee;
    const ev_profit = ev_return - total_cost;
    const machine_rate = total_cost > 0 ? ev_return / total_cost * 100 : 0;
    const break_even = p10n > 0 ? (total_cost - r9 * p9n) / p10n * 100 : 999;
    const buy_limit = ev_return - fee;
    const reasons = [], tags = [];
    if (machine_rate >= 100) { reasons.push('期待値プラス'); tags.push({type:'ok', label:'期待値プラス'}); }
    else { reasons.push('期待値マイナス'); tags.push({type:'ng', label:'期待値マイナス'}); }
    if (r10 * 100 >= 80) { reasons.push('PSA10率が非常に高い'); tags.push({type:'ok', label:'高10率'}); }
    else tags.push({type:'warn', label:'10率要確認'});
    if (p9 >= 10000) { reasons.push('PSA9も高値で売れる'); tags.push({type:'ok', label:'PSA9強い'}); }
    else tags.push({type:'warn', label:'PSA9確認'});
    if (cost <= buy_limit) tags.push({type:'ok', label:'仕入れOK'}); else { reasons.push('仕入れ高すぎ'); tags.push({type:'ng', label:'仕入れ高すぎ'}); }
    renderResult('ukiyoe', ev_profit, machine_rate, break_even, total_cost, buy_limit, r10 * 100, reasons, tags);
  }
}
</script>
</body>
</html>
